<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#060e1a"/>
      <stop offset="40%" stop-color="#0a1628"/>
      <stop offset="70%" stop-color="#0f1f3d"/>
      <stop offset="100%" stop-color="#1a3a6b"/>
    </linearGradient>
    <linearGradient id="building1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a5f" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#0a1628" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="building2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a4a7f" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0f1f3d" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="building3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3a6b" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0a1628" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glowR" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </linearGradient>
    <filter id="glowFilter">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.02" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Sky background -->
  <rect width="1920" height="1080" fill="url(#sky)"/>
  <rect width="1920" height="1080" fill="url(#grid)"/>

  <!-- Ambient glow -->
  <ellipse cx="300" cy="350" rx="500" ry="400" fill="url(#glow)"/>
  <ellipse cx="1600" cy="450" rx="450" ry="350" fill="url(#glowR)"/>
  <ellipse cx="960" cy="800" rx="600" ry="200" fill="#2563eb" opacity="0.03"/>

  <!-- ============ BACKGROUND BUILDINGS (far) ============ -->
  <g opacity="0.25">
    <rect x="60" y="450" width="35" height="350" fill="#1a3a6b" rx="1"/>
    <rect x="110" y="420" width="30" height="380" fill="#0f1f3d" rx="1"/>
    <rect x="420" y="380" width="40" height="420" fill="#1a3a6b" rx="1"/>
    <rect x="480" y="410" width="35" height="390" fill="#0f1f3d" rx="1"/>
    <rect x="530" y="440" width="30" height="360" fill="#1a3a6b" rx="1"/>
    <rect x="1350" y="400" width="40" height="400" fill="#1a3a6b" rx="1"/>
    <rect x="1410" y="370" width="35" height="430" fill="#0f1f3d" rx="1"/>
    <rect x="1470" y="420" width="45" height="380" fill="#1a3a6b" rx="1"/>
    <rect x="1720" y="440" width="30" height="360" fill="#0f1f3d" rx="1"/>
    <rect x="1770" y="410" width="40" height="390" fill="#1a3a6b" rx="1"/>
  </g>

  <!-- ============ MID BUILDINGS ============ -->
  <g opacity="0.5">
    <rect x="160" y="350" width="50" height="450" fill="url(#building2)" rx="2"/>
    <rect x="170" y="370" width="6" height="12" fill="#60a5fa" opacity="0.3"/>
    <rect x="185" y="370" width="6" height="12" fill="#60a5fa" opacity="0.2"/>
    <rect x="170" y="395" width="6" height="12" fill="#60a5fa" opacity="0.25"/>
    <rect x="185" y="395" width="6" height="12" fill="#60a5fa" opacity="0.35"/>

    <rect x="220" y="300" width="65" height="500" fill="url(#building1)" rx="2"/>
    <rect x="235" y="325" width="8" height="15" fill="#60a5fa" opacity="0.2"/>
    <rect x="255" y="325" width="8" height="15" fill="#60a5fa" opacity="0.3"/>
    <rect x="235" y="355" width="8" height="15" fill="#60a5fa" opacity="0.35"/>
    <rect x="255" y="355" width="8" height="15" fill="#60a5fa" opacity="0.2"/>

    <rect x="300" y="380" width="45" height="420" fill="url(#building3)" rx="2"/>

    <rect x="1100" y="330" width="55" height="470" fill="url(#building2)" rx="2"/>
    <rect x="1115" y="360" width="8" height="15" fill="#60a5fa" opacity="0.3"/>
    <rect x="1132" y="360" width="8" height="15" fill="#60a5fa" opacity="0.2"/>

    <rect x="1170" y="280" width="70" height="520" fill="url(#building1)" rx="2"/>
    <rect x="1185" y="310" width="10" height="18" fill="#60a5fa" opacity="0.2"/>
    <rect x="1210" y="310" width="10" height="18" fill="#60a5fa" opacity="0.3"/>
    <rect x="1185" y="345" width="10" height="18" fill="#60a5fa" opacity="0.35"/>

    <rect x="1550" y="350" width="50" height="450" fill="url(#building3)" rx="2"/>
    <rect x="1610" y="320" width="60" height="480" fill="url(#building2)" rx="2"/>
    <rect x="1625" y="350" width="8" height="15" fill="#60a5fa" opacity="0.3"/>
    <rect x="1645" y="350" width="8" height="15" fill="#60a5fa" opacity="0.2"/>
  </g>

  <!-- ============ TALL CENTER BUILDINGS ============ -->
  <g opacity="0.7">
    <rect x="660" y="180" width="80" height="620" fill="url(#building1)" rx="2"/>
    <rect x="675" y="210" width="10" height="20" fill="#60a5fa" opacity="0.3"/>
    <rect x="700" y="210" width="10" height="20" fill="#60a5fa" opacity="0.2"/>
    <rect x="715" y="210" width="10" height="20" fill="#60a5fa" opacity="0.35"/>
    <rect x="675" y="250" width="10" height="20" fill="#60a5fa" opacity="0.2"/>
    <rect x="700" y="250" width="10" height="20" fill="#60a5fa" opacity="0.35"/>
    <rect x="715" y="250" width="10" height="20" fill="#60a5fa" opacity="0.25"/>

    <rect x="760" y="120" width="100" height="680" fill="url(#building2)" rx="2"/>
    <rect x="780" y="150" width="12" height="22" fill="#60a5fa" opacity="0.2"/>
    <rect x="805" y="150" width="12" height="22" fill="#60a5fa" opacity="0.35"/>
    <rect x="830" y="150" width="12" height="22" fill="#60a5fa" opacity="0.25"/>
    <rect x="780" y="190" width="12" height="22" fill="#60a5fa" opacity="0.35"/>
    <rect x="805" y="190" width="12" height="22" fill="#60a5fa" opacity="0.2"/>
    <rect x="830" y="190" width="12" height="22" fill="#60a5fa" opacity="0.3"/>

    <rect x="880" y="160" width="90" height="640" fill="url(#building3)" rx="2"/>
    <rect x="895" y="190" width="12" height="20" fill="#60a5fa" opacity="0.3"/>
    <rect x="920" y="190" width="12" height="20" fill="#60a5fa" opacity="0.2"/>
    <rect x="945" y="190" width="12" height="20" fill="#60a5fa" opacity="0.35"/>

    <rect x="990" y="220" width="70" height="580" fill="url(#building1)" rx="2"/>
    <rect x="1005" y="250" width="10" height="18" fill="#60a5fa" opacity="0.2"/>
    <rect x="1028" y="250" width="10" height="18" fill="#60a5fa" opacity="0.35"/>
    <rect x="1040" y="250" width="10" height="18" fill="#60a5fa" opacity="0.25"/>
  </g>

  <!-- ============ BILLBOARDS ============ -->
  <g opacity="0.6">
    <!-- Billboard 1 left -->
    <rect x="380" y="480" width="5" height="320" fill="#60a5fa" opacity="0.2"/>
    <rect x="348" y="460" width="70" height="45" fill="#1a3a6b" opacity="0.6" rx="3"/>
    <rect x="353" y="465" width="60" height="35" fill="#2563eb" opacity="0.2" rx="2"/>
    <rect x="360" y="472" width="20" height="8" fill="#3b82f6" opacity="0.3" rx="1"/>
    <rect x="386" y="472" width="20" height="8" fill="#60a5fa" opacity="0.2" rx="1"/>

    <!-- Billboard 2 center -->
    <rect x="560" y="500" width="5" height="300" fill="#60a5fa" opacity="0.2"/>
    <rect x="528" y="480" width="70" height="45" fill="#1a3a6b" opacity="0.6" rx="3"/>
    <rect x="533" y="485" width="60" height="35" fill="#2563eb" opacity="0.2" rx="2"/>
    <rect x="540" y="492" width="15" height="8" fill="#3b82f6" opacity="0.3" rx="1"/>
    <rect x="562" y="492" width="15" height="8" fill="#60a5fa" opacity="0.2" rx="1"/>

    <!-- Billboard 3 right -->
    <rect x="1300" y="490" width="5" height="310" fill="#60a5fa" opacity="0.2"/>
    <rect x="1268" y="470" width="70" height="45" fill="#1a3a6b" opacity="0.6" rx="3"/>
    <rect x="1273" y="475" width="60" height="35" fill="#2563eb" opacity="0.2" rx="2"/>
    <rect x="1280" y="482" width="20" height="8" fill="#3b82f6" opacity="0.3" rx="1"/>
    <rect x="1306" y="482" width="20" height="8" fill="#60a5fa" opacity="0.2" rx="1"/>

    <!-- Billboard glow effects -->
    <ellipse cx="383" cy="482" rx="40" ry="8" fill="#3b82f6" opacity="0.2"/>
    <ellipse cx="563" cy="502" rx="40" ry="8" fill="#3b82f6" opacity="0.2"/>
    <ellipse cx="1303" cy="492" rx="40" ry="8" fill="#3b82f6" opacity="0.2"/>
  </g>

  <!-- ============ GROUND / BASE ============ -->
  <rect x="0" y="800" width="1920" height="280" fill="#060e1a" opacity="0.9"/>
  <line x1="0" y1="795" x2="1920" y2="795" stroke="#2563eb" stroke-opacity="0.08" stroke-width="1"/>

  <!-- Ground reflection line -->
  <line x1="0" y1="800" x2="1920" y2="800" stroke="#3b82f6" stroke-opacity="0.05" stroke-width="2"/>

  <!-- ============ PARTICLES / STARS ============ -->
  <g opacity="0.4" filter="url(#glowFilter)">
    <circle cx="180" cy="200" r="1.5" fill="#60a5fa"/>
    <circle cx="450" cy="150" r="1" fill="#60a5fa"/>
    <circle cx="680" cy="100" r="1.5" fill="#60a5fa"/>
    <circle cx="900" cy="80" r="2" fill="#60a5fa"/>
    <circle cx="1150" cy="120" r="1.5" fill="#60a5fa"/>
    <circle cx="1400" cy="160" r="1" fill="#60a5fa"/>
    <circle cx="1650" cy="140" r="1.5" fill="#60a5fa"/>
    <circle cx="350" cy="280" r="1" fill="#60a5fa"/>
    <circle cx="750" cy="250" r="1.5" fill="#60a5fa"/>
    <circle cx="1250" cy="220" r="1" fill="#60a5fa"/>
    <circle cx="1550" cy="270" r="1.5" fill="#60a5fa"/>
    <circle cx="500" cy="350" r="1" fill="#60a5fa"/>
    <circle cx="1050" cy="300" r="1.5" fill="#60a5fa"/>
    <circle cx="1780" cy="250" r="1" fill="#60a5fa"/>
    <circle cx="80" cy="320" r="1" fill="#60a5fa"/>
  </g>

  <!-- ============ DECORATIVE ACCENTS ============ -->
  <g opacity="0.04">
    <line x1="0" y1="0" x2="1920" y2="1080" stroke="#ffffff" stroke-width="1"/>
    <line x1="400" y1="0" x2="1920" y2="560" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="1200" y2="1080" stroke="#ffffff" stroke-width="0.5"/>
  </g>

  <!-- Subtle vignette -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
    <stop offset="60%" stop-color="#000" stop-opacity="0"/>
    <stop offset="100%" stop-color="#000" stop-opacity="0.4"/>
  </radialGradient>
  <rect width="1920" height="1080" fill="url(#vignette)"/>
</svg>
